name: Build LaTeX document
permissions:
  contents: write
on: [push]
jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          # Value already defaults to true, but `persist-credentials` is required to push new commits to the repository.
          persist-credentials: true
      - name: wordcount in report
        run: |
          sudo apt-get update && sudo apt-get install -y texcount
          texcount -1 -sum -inc report.tex > word.count
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v4
        with:
          root_file: report.tex
          post_compile: "latexmk -c"
          texlive_version: latest

      - uses: stefanzweifel/git-auto-commit-action@v7
